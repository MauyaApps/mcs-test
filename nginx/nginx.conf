# Основные настройки производительности
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логи (помогут понять, доходит ли запрос с телефона)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Оптимизация передачи файлов
    sendfile        on;
    keepalive_timeout  65;

    # Настройки проксирования для WebSocket (критично для Socket.io)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _; # Принимать запросы по любому IP (в т.ч. 192.168.0.106)

        # 1. FRONTEND (Vite / React)
        # Все запросы на корень (/) уходят на сервис 'frontend' в докере
        location / {
            proxy_pass http://172.20.0.5:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. BACKEND API
        # Все запросы, начинающиеся на /api, уходят на сервис 'backend'
        location /api {
            # Убираем префикс /api перед отправкой на бэкенд, если бэкенд его не ждет
            # rewrite ^/api/(.*) /$1 break; 
            
            proxy_pass http://172.20.0.4:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. SOCKET.IO (Чат в реальном времени)
        # Самая важная часть для работы уведомлений и чата на мобилках
        location /socket.io/ {
            proxy_pass http://172.20.0.4:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;

            # Увеличение таймаутов, чтобы сокет не разрывался
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

    }
}
